name: Test Automation Scripts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Syntax check
        run: |
          set -Eeuo pipefail
          python3 -m py_compile scripts/*.py

      - name: Select newest stable Stalwart release
        run: |
          set -Eeuo pipefail
          selected="$(
            python3 scripts/list-stalwart-tags.py \
              --releases-file tests/fixtures/stalwart-releases-mini.json \
              --print-latest
          )"
          test "${selected}" = "v0.16.15"
          python3 scripts/list-stalwart-tags.py \
            --releases-file tests/fixtures/stalwart-releases-mini.json \
            --validate v0.16.15

      - name: Validate required Stalwart features
        run: |
          set -Eeuo pipefail
          features="$(
            python3 scripts/validate-stalwart-features.py \
              tests/fixtures/stalwart-main-Cargo.toml
          )"
          test "${features}" = "foundationdb s3 zenoh enterprise"
          sed '/^zenoh =/d' tests/fixtures/stalwart-main-Cargo.toml \
            > /tmp/stalwart-main-without-zenoh.toml
          if python3 scripts/validate-stalwart-features.py \
            /tmp/stalwart-main-without-zenoh.toml; then
            echo "Expected a manifest without zenoh to fail validation" >&2
            exit 1
          fi

      - name: Detect Stalwart FDB API series
        run: |
          set -Eeuo pipefail
          series="$(
            python3 scripts/detect-fdb-series.py \
              --manifest-file tests/fixtures/stalwart-store-Cargo.toml
          )"
          test "${series}" = "7.4"

      - name: Select newest explicitly non-AVX FDB release
        run: |
          set -Eeuo pipefail
          selected="$(
            python3 scripts/select-fdb-version.py \
              --series 7.4 \
              --releases-file tests/fixtures/fdb-releases-740-mini.json \
              --print-version
          )"
          test "${selected}" = "7.4.4"

      - name: Reject AVX FDB override
        run: |
          set -Eeuo pipefail
          if python3 scripts/select-fdb-version.py \
            --series 7.4 \
            --releases-file tests/fixtures/fdb-releases-740-mini.json \
            --requested-version 7.4.6 \
            --print-version; then
            echo "Expected AVX override to fail" >&2
            exit 1
          fi
